<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Online quote · Ready Rent-a-Car</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/site.css" />

</head>
<body data-page="quote">
  <header class="site-header" id="site-header"></header>
  <main id="main" class="page page-quote">
    <p class="eyebrow">Ready</p>
    <h1 id="page-title">Online quote</h1>
    <p class="lede" id="page-lede"></p>

    <div class="quote-layout">
      <form class="quote-panel" id="quote-form">
        <nav class="steps" aria-label="Quote steps">
          <button type="button" class="step-pill is-active" data-qstep="1" id="q-step1-label">1 · Trip</button>
          <button type="button" class="step-pill" data-qstep="2" id="q-step2-label" disabled>2 · Vehicle</button>
          <button type="button" class="step-pill" data-qstep="3" id="q-step3-label" disabled>3 · Extras</button>
          <button type="button" class="step-pill" data-qstep="4" id="q-step4-label" disabled>4 · Details</button>
          <button type="button" class="step-pill" data-qstep="5" id="q-step5-label" disabled>5 · Pay</button>
        </nav>
        <p class="field-error" id="quote-error" hidden></p>

        <div data-qpanel="1">
          <div class="field" style="margin-bottom:12px">
            <label data-i18n="search.pickup">Pick-up</label>
            <select name="pickup"></select>
          </div>
          <label class="check" style="margin-bottom:12px">
            <input type="checkbox" name="oneway" />
            <span data-i18n="search.oneway">One-way</span>
          </label>
          <div class="field" data-drop-wrap hidden style="margin-bottom:12px">
            <label data-i18n="search.dropoff">Drop-off</label>
            <select name="dropoff"></select>
          </div>
          <div class="grid-2" style="margin-bottom:16px">
            <div class="field">
              <label data-i18n="search.from">From</label>
              <input type="datetime-local" name="from" />
            </div>
            <div class="field">
              <label data-i18n="search.until">Until</label>
              <input type="datetime-local" name="until" />
            </div>
          </div>
          <div class="quote-actions">
            <button type="button" class="btn btn-ember" id="to-step-2" data-i18n="quotePage.showCars">Show vehicles</button>
          </div>
        </div>

        <div data-qpanel="2" hidden>
          <div id="quote-cars"></div>
          <div class="quote-actions">
            <button type="button" class="btn btn-ghost" id="back-1" data-i18n="quotePage.back">Back</button>
            <button type="button" class="btn btn-ember" id="to-step-3" data-i18n="quotePage.showExtras">Continue to extras</button>
          </div>
        </div>

        <div data-qpanel="3" hidden>
          <div id="cover-matrix" class="cover-matrix" hidden></div>
          <div id="cover-simple" class="cover-simple" hidden></div>
          <p data-i18n="quotePage.extrasLede" style="margin:0 0 14px;color:var(--muted)"></p>
          <div id="quote-extras" class="extras-picker"></div>
          <div class="quote-actions">
            <button type="button" class="btn btn-ghost" id="back-2" data-i18n="quotePage.back">Back</button>
            <button type="button" class="btn btn-ember" id="to-step-4" data-i18n="quotePage.continue">Continue</button>
          </div>
        </div>

        <div data-qpanel="4" hidden>
          <div class="field" style="margin-bottom:12px">
            <label data-i18n="quotePage.name">Name</label>
            <input name="name" autocomplete="name" required />
          </div>
          <div class="field" style="margin-bottom:12px">
            <label data-i18n="quotePage.email">Email</label>
            <input type="email" name="email" autocomplete="email" required />
          </div>
          <div class="field" style="margin-bottom:12px">
            <label data-i18n="quotePage.phone">Phone</label>
            <input name="phone" type="tel" autocomplete="tel" required />
          </div>
          <div class="field" style="margin-bottom:16px">
            <label data-i18n="quotePage.notes">Notes</label>
            <textarea name="notes" rows="3" data-i18n="quotePage.notesPh"></textarea>
          </div>
          <div class="quote-actions">
            <button type="button" class="btn btn-ghost" id="back-3" data-i18n="quotePage.back">Back</button>
            <button type="button" class="btn btn-ember" id="to-step-5" data-i18n="quotePage.continue">Continue</button>
          </div>
        </div>

        <div data-qpanel="5" hidden>
          <p data-i18n="quotePage.payLedeSafe" style="margin:0 0 8px;color:var(--muted)"></p>
          <div class="pay-methods" role="radiogroup" aria-label="Payment preference">
            <label class="pay-option">
              <input type="radio" name="pay" value="mercadopago" checked />
              <div>
                <div class="pay-brand">
                  <span class="pay-logo mp">MP</span>
                  <span data-i18n="quotePage.payMp">Mercado Pago</span>
                </div>
                <p class="pay-desc" data-i18n="quotePage.payMpDesc">Cards, debit, and 6 interest-free installments with Premium.</p>
              </div>
              <span class="pay-badge hot" data-i18n="quotePage.payMpBadge">6×</span>
            </label>
            <label class="pay-option">
              <input type="radio" name="pay" value="stripe" />
              <div>
                <div class="pay-brand">
                  <span class="pay-logo stripe">Stripe</span>
                  <span data-i18n="quotePage.payStripe">Stripe</span>
                </div>
                <p class="pay-desc" data-i18n="quotePage.payStripeDesc">International cards — ideal for foreign travelers.</p>
              </div>
              <span class="pay-badge" data-i18n="quotePage.payStripeBadge">Intl</span>
            </label>
          </div>
          <div class="quote-actions">
            <button type="button" class="btn btn-ghost" id="back-4" data-i18n="quotePage.back">Back</button>
            <button type="submit" class="btn btn-ember" data-i18n="quotePage.payCtaSafe">Send quote on WhatsApp</button>
          </div>
        </div>
      </form>

      <aside class="quote-panel quote-aside" id="quote-aside">
        <h3 style="margin-top:0" data-i18n="quotePage.summary">Summary</h3>
        <div class="summary-box" id="quote-summary"></div>
      </aside>
    </div>

    <div class="quote-sticky" id="quote-sticky" hidden>
      <div class="quote-sticky-sum">
        <span data-i18n="quotePage.lineTotal">Total</span>
        <strong id="quote-sticky-total">—</strong>
      </div>
      <button type="button" class="btn btn-ember" id="quote-sticky-cta">Continue</button>
    </div>

    <div class="card" id="success" hidden style="margin-top:24px">
      <div class="card-body">
        <h2 id="success-title"></h2>
        <p id="success-body" style="color:var(--muted)"></p>
        <p id="success-pay" style="font-weight:600;margin:12px 0"></p>
        <a class="btn btn-ember" id="success-wa" href="#" target="_blank" rel="noopener"></a>
      </div>
    </div>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/features.js"></script>
  <script src="js/bff.js"></script>
  <script src="js/jedeye.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
