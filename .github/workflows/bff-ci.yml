name: BFF CI

on:
  pull_request:
    paths:
      - "bff/**"
      - ".github/workflows/bff-ci.yml"
      - ".github/workflows/bff-deploy.yml"
  push:
    branches: [main]
    paths:
      - "bff/**"
      - ".github/workflows/bff-ci.yml"
      - ".github/workflows/bff-deploy.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: bff

jobs:
  build-test:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bff/package-lock.json
      - run: npm ci
      - run: npm run ci
