name = "ready-rentacar-bff"
main = "src/index.ts"
compatibility_date = "2025-07-01"
workers_dev = true

# Public defaults (no secrets). Override via wrangler secret / .dev.vars.
[vars]
ANYRENT_API_BASE = "https://readyrac.api.anyrent.pt/v1"
# Comma-separated origins allowed for browser CORS (staging GH Pages + local).
CORS_ORIGINS = "http://127.0.0.1:5500,http://localhost:5500,http://127.0.0.1:8080,http://localhost:8080,https://fertroya.github.io"

# Secrets (set locally in .dev.vars — see .dev.vars.example):
#   ANYRENT_API_KEY
#
# Production:
#   npx wrangler secret put ANYRENT_API_KEY
